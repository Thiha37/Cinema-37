<body>

    <div class="container">
        <header>
            <h1>My Cinema</h1>
            <p>Cinema 37</p>
        </header>

        <!-- Search Bar -->
        <div class="search-section">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="ရုပ်ရှင်/ဇာတ်လမ်းတွဲ/ရုပ်သံလိုင်း အမည်ဖြင့် ရှာဖွေရန်...">
            </div>
        </div>

        <!-- Category Tabs -->
        <div class="category-tabs">
            <button class="tab-btn active" data-category="all">အားလုံး</button>
            <button class="tab-btn" data-category="movie">Movies</button>
            <button class="tab-btn" data-category="series">Series</button>
            <button class="tab-btn" data-category="channel">Channels</button>
        </div>

        <!-- Video Player Block -->
        <div class="player-section" id="playerSection">
            <div class="player-wrapper">
                <video id="videoPlayer" controls autoplay controlsList="nodownload">
                    <source src="" type="video/mp4">
                    သင့် Browser သည် ဗီဒီယို Play ရန် အဆင်မပြေပါ။
                </video>
            </div>
            <h3 id="playingTitle">ရုပ်ရှင်အမည်</h3>
        </div>

        <!-- Movie List Grid -->
        <div class="movie-grid" id="movieGrid">
            <!-- ဇာတ်ကားကတ်ပြားများကို JavaScript ကနေ ဒီနေရာမှာ လာထည့်ပေးပါလိမ့်မယ် -->
        </div>
    </div>

    <script>
        // Data စာရင်း - category နေရာတွင် 'movie', 'series', 'channel' ဟု ခွဲခြားပေးရပါမည်
        const mediaList = [
            {
                title: "Spiderman: No Way Home",
                year: "2021",
                category: "movie",
                thumbnail: "https://image.tmdb.org/t/p/w500/1g0zzZ3RiF79Cc3m2ZUIftI6w4B.jpg",
                streamUrl: "https://stream-akamai.castr.com/5b9352dbda7b8c769937e459/live_2361c920455111ea85db6911fe397b9e/index.fmp4.m3u8"
            },
            {
                title: "Avatar: The Way of Water",
                year: "2022",
                category: "movie",
                thumbnail: "https://image.tmdb.org/t/p/w500/t6zl0f2mXfsJ64837vA128VzZ64.jpg",
                streamUrl: "https://your-telegram-bot-direct-link-2.mp4"
            },
            {
                title: "John Wick: Chapter 4",
                year: "2023",
                category: "movie",
                thumbnail: "https://image.tmdb.org/t/p/w500/vZloY6YST8txCslo9uYStw6IDf5.jpg",
                streamUrl: "https://apgy.in/yt/MXQ4Y4vK0IU"
            },
            {
                title: "Loki Season 2",
                year: "2023",
                category: "series",
                thumbnail: "https://image.tmdb.org/t/p/w500/voL1s634B03a.jpg",
                streamUrl: "https://your-telegram-bot-series-link.mp4"
            },
            {
                title: "Live Sports Channel 24/7",
                year: "LIVE",
                category: "channel",
                thumbnail: "https://via.placeholder.com/200x280?text=Live+Channel",
                streamUrl: "https://your-telegram-live-stream.mp4"
            }
        ];

        let currentCategory = 'all';

        const movieGrid = document.getElementById('movieGrid');
        const playerSection = document.getElementById('playerSection');
        const videoPlayer = document.getElementById('videoPlayer');
        const playingTitle = document.getElementById('playingTitle');
        const searchInput = document.getElementById('searchInput');
        const tabBtns = document.querySelectorAll('.tab-btn');

        // Category အမျိုးအစားအလိုက် Badge စာသားပြရန်
        const categoryLabels = {
            movie: "Movie",
            series: "Series",
            channel: "Channel"
        };

        // Data များကို စစ်ထုတ်ပြီး Grid ပေါ်တွင် ပြသပေးသည့် Function
        function renderMedia() {
            const keyword = searchInput.value.toLowerCase().trim();
            
            // Search မူတည်၍ Filter စစ်ခြင်း
            const filteredData = mediaList.filter(item => {
                const matchesSearch = item.title.toLowerCase().includes(keyword);
                const matchesCategory = (currentCategory === 'all' || item.category === currentCategory);

                if (keyword.length > 0) {
                    return matchesSearch;
                }
                
                return matchesCategory;
            });

            movieGrid.innerHTML = '';
            
            if (filteredData.length === 0) {
                movieGrid.innerHTML = '<div class="no-results">ရှာဖွေမှု မတွေ့ရှိပါ။</div>';
                return;
            }

            filteredData.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <span class="category-badge">${categoryLabels[item.category] || item.category}</span>
                    <img class="movie-poster" src="${item.thumbnail}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/200x280?text=No+Image'">
                    <div class="movie-info">
                        <div class="movie-title">${item.title}</div>
                        <div class="movie-year">${item.year}</div>
                    </div>
                `;
                
                card.onclick = () => playMedia(item);
                movieGrid.appendChild(card);
            });
        }

        function playMedia(item) {
            playingTitle.innerText = `${item.title} (${item.year})`;
            videoPlayer.src = item.streamUrl;
            playerSection.style.display = 'block';
            videoPlayer.load();
            videoPlayer.play();
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- Search Bar Event ---
        searchInput.addEventListener('input', renderMedia);

        // --- Category Tabs Event ---
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                currentCategory = btn.dataset.category;
                renderMedia();
            });
        });

        // စတင်ပွင့်ချိန်တွင် Render လုပ်ပေးခြင်း
        window.onload = renderMedia;
    </script>
